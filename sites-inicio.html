<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Salud Cartagena Este</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; }

.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  min-height: 500px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url('https://ramongalera22-ai.github.io/Cartagenaeste/centro-salud.png');
  background-size: cover;
  background-position: center top;
  background-color: #1a3a2a;
  filter: brightness(.55);
  z-index: 0;
}

.hero-content {
  position: relative;
  z-index: 2;
  padding: 20px;
}

h1 {
  color: #fff;
  font-size: clamp(2.2rem, 6vw, 4rem);
  font-weight: 400;
  font-style: italic;
  font-family: Georgia, serif;
  line-height: 1.15;
  margin-bottom: 18px;
  text-shadow: 0 2px 20px rgba(0,0,0,.6);
}

.sub {
  color: rgba(255,255,255,.85);
  font-size: .95rem;
  margin-bottom: 44px;
  letter-spacing: .02em;
}

.buttons {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  padding: 15px 44px;
  font-size: .85rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 3px;
  transition: all .2s;
  min-width: 170px;
  text-align: center;
  cursor: pointer;
  display: inline-block;
}

.btn-pac {
  background: #c8920a;
  color: #fff;
  border: 2px solid #c8920a;
}
.btn-pac:hover { background: #e0a80f; border-color: #e0a80f; transform: translateY(-2px); }

.btn-pro {
  background: transparent;
  color: #fff;
  border: 2px solid rgba(255,255,255,.8);
}
.btn-pro:hover { background: rgba(255,255,255,.15); border-color: #fff; transform: translateY(-2px); }
</style>
</head>
<body>
<div class="hero">
  <div class="hero-content">
    <h1>Tu salud,<br>nuestra prioridad</h1>
    <p class="sub">Salud y Formación para tu comunidad</p>
    <div class="buttons">
      <a class="btn btn-pac" href="https://ramongalera22-ai.github.io/Cartagenaeste/pacientes.html" target="_top">Pacientes</a>
      <a class="btn btn-pro" href="https://ramongalera22-ai.github.io/Cartagenaeste/blog-categorias.html" target="_top">Profesionales</a>
    </div>
  </div>
</div>
</body>
</html>
