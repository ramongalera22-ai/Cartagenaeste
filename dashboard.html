<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Área II Cartagena</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.nav{background:rgba(15,23,42,.95);padding:14px 20px;color:#fff;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;border-bottom:1px solid #1e293b}
.nav h1{font-size:1.05rem}.nav a{color:#86efac;text-decoration:none;font-size:.85rem}
.container{max-width:900px;margin:0 auto;padding:16px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;text-align:center}
.stat-card .val{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .lbl{font-size:.72rem;color:#94a3b8;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.section{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:16px}
.section h3{font-size:1rem;color:#60a5fa;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.tab-row{display:flex;gap:4px;margin-bottom:14px;background:#0f172a;border-radius:8px;padding:3px}
.tab-row button{flex:1;padding:8px;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;font-family:inherit;background:transparent;color:#94a3b8}
.tab-row button.active{background:#3b82f6;color:#fff}
.history-item{display:flex;gap:10px;padding:12px;border-bottom:1px solid #334155;align-items:flex-start}
.history-item:last-child{border-bottom:none}
.history-item .time{font-size:.7rem;color:#64748b;white-space:nowrap;min-width:50px}
.history-item .q{font-size:.85rem;color:#e2e8f0;font-weight:600}
.history-item .a{font-size:.8rem;color:#94a3b8;margin-top:4px;line-height:1.5;max-height:60px;overflow:hidden}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;padding:10px 0}
.bar{flex:1;background:linear-gradient(to top,#3b82f6,#60a5fa);border-radius:4px 4px 0 0;min-height:4px;position:relative;transition:height .5s}
.bar .bar-lbl{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:.6rem;color:#64748b;white-space:nowrap}
.bar .bar-val{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:.65rem;color:#60a5fa;font-weight:700}
.empty{text-align:center;padding:30px;color:#64748b;font-size:.85rem}
.btn{padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid #334155}
.btn-red{background:#7f1d1d;color:#fca5a5;border-color:#991b1b}
.btn-blue{background:#1e3a5f;color:#93c5fd;border-color:#1d4ed8}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.top-list{display:flex;flex-direction:column;gap:6px}
.top-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#0f172a;border-radius:8px}
.top-item .rank{font-size:.8rem;font-weight:800;color:#64748b;width:20px}
.top-item .name{flex:1;font-size:.85rem}
.top-item .count{font-size:.82rem;font-weight:700;color:#60a5fa}
</style>
</head>
<body>
<div class="nav"><a href="javascript:history.back()">← Volver</a><h1>📊 Dashboard</h1></div>
<div class="container">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="section">
        <h3>📈 Actividad semanal</h3>
        <div class="bar-chart" id="weekChart"></div>
    </div>

    <div class="section">
        <h3>🏆 Más consultados</h3>
        <div class="tab-row">
            <button class="active" onclick="showTop('protocolos',this)">Protocolos</button>
            <button onclick="showTop('herramientas',this)">Herramientas</button>
            <button onclick="showTop('busquedas',this)">Búsquedas</button>
        </div>
        <div class="top-list" id="topList"></div>
    </div>

    <div class="section">
        <h3>🤖 Historial de consultas IA</h3>
        <div class="tab-row">
            <button class="active" onclick="showHistory('all',this)">Todas</button>
            <button onclick="showHistory('cuaderno',this)">Cuaderno</button>
            <button onclick="showHistory('urgencias',this)">Urgencias</button>
            <button onclick="showHistory('enfermeria',this)">Enfermería</button>
        </div>
        <div id="historyList" style="max-height:400px;overflow-y:auto;"></div>
        <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end;">
            <button class="btn btn-blue" onclick="exportHistory()">📋 Exportar</button>
            <button class="btn btn-red" onclick="clearHistory()">🗑️ Borrar historial</button>
        </div>
    </div>

    <div class="section">
        <h3>💾 Almacenamiento local</h3>
        <div id="storageInfo" style="font-size:.85rem;color:#94a3b8;"></div>
        <button class="btn btn-red" onclick="if(confirm('¿Borrar TODOS los datos locales? (favoritos, configuración, notas, historial)')){localStorage.clear();location.reload();}" style="margin-top:10px;">🗑️ Borrar todos los datos locales</button>
    </div>
</div>

<script>
// Collect stats from localStorage
function getStats(){
    var stats={
        totalVisits:parseInt(localStorage.getItem('totalVisits')||'0')+1,
        aiQueries:0,
        protocolViews:0,
        favCount:0,
        guardiaPacientes:0,
        notesCount:0
    };
    localStorage.setItem('totalVisits',stats.totalVisits);

    // Count AI history
    try{var h=JSON.parse(localStorage.getItem('aiHistory')||'[]');stats.aiQueries=h.length;}catch(e){}
    // Count favorites
    try{var f=JSON.parse(localStorage.getItem('favSecciones')||'[]');stats.favCount=f.length;}catch(e){}
    // Count guardia patients
    try{var g=JSON.parse(localStorage.getItem('guardias_hoy')||'[]');stats.guardiaPacientes=g.length;}catch(e){}
    // Notes
    var n=localStorage.getItem('guardias_notas')||'';stats.notesCount=n.length>0?1:0;

    // Track daily visits
    var today=new Date().toISOString().split('T')[0];
    try{
        var daily=JSON.parse(localStorage.getItem('dailyVisits')||'{}');
        daily[today]=(daily[today]||0)+1;
        // Keep only last 7 days
        var keys=Object.keys(daily).sort().slice(-7);
        var clean={};keys.forEach(function(k){clean[k]=daily[k];});
        localStorage.setItem('dailyVisits',JSON.stringify(clean));
    }catch(e){}

    // Track page views
    try{
        var views=JSON.parse(localStorage.getItem('pageViews')||'{}');
        stats.protocolViews=Object.values(views).reduce(function(a,b){return a+b;},0);
    }catch(e){}

    return stats;
}

function renderStats(){
    var s=getStats();
    var cards=[
        {val:s.totalVisits,lbl:'Visitas'},
        {val:s.aiQueries,lbl:'Consultas IA'},
        {val:s.protocolViews,lbl:'Protocolos vistos'},
        {val:s.favCount,lbl:'Favoritos'},
        {val:s.guardiaPacientes,lbl:'Pac. guardia hoy'},
        {val:s.notesCount?'✅':'—',lbl:'Notas guardia'}
    ];
    document.getElementById('statsGrid').innerHTML=cards.map(function(c){
        return '<div class="stat-card"><div class="val">'+c.val+'</div><div class="lbl">'+c.lbl+'</div></div>';
    }).join('');
}

function renderWeekChart(){
    try{var daily=JSON.parse(localStorage.getItem('dailyVisits')||'{}');}catch(e){var daily={};}
    var days=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
    var d=new Date();d.setDate(d.getDate()-d.getDay()+1);
    var max=1;var data=[];
    for(var i=0;i<7;i++){
        var ds=d.toISOString().split('T')[0];
        var v=daily[ds]||0;
        if(v>max)max=v;
        data.push({label:days[i],value:v});
        d.setDate(d.getDate()+1);
    }
    document.getElementById('weekChart').innerHTML=data.map(function(d){
        var h=Math.max(4,d.value/max*100);
        return '<div class="bar" style="height:'+h+'%"><div class="bar-val">'+d.value+'</div><div class="bar-lbl">'+d.label+'</div></div>';
    }).join('');
}

function showTop(type,btn){
    document.querySelectorAll('.tab-row button').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    try{var views=JSON.parse(localStorage.getItem('pageViews')||'{}');}catch(e){var views={};}
    var items=Object.entries(views).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
    if(items.length===0){
        document.getElementById('topList').innerHTML='<div class="empty">Sin datos aún. Navega por la app para generar estadísticas.</div>';
        return;
    }
    document.getElementById('topList').innerHTML=items.map(function(item,i){
        return '<div class="top-item"><div class="rank">#'+(i+1)+'</div><div class="name">'+item[0]+'</div><div class="count">'+item[1]+' vistas</div></div>';
    }).join('');
}

function showHistory(filter,btn){
    if(btn){document.querySelectorAll('.tab-row button').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');}
    try{var history=JSON.parse(localStorage.getItem('aiHistory')||'[]');}catch(e){var history=[];}
    if(filter!=='all') history=history.filter(function(h){return h.section===filter;});
    history=history.slice(-50).reverse();
    if(history.length===0){
        document.getElementById('historyList').innerHTML='<div class="empty">No hay consultas IA registradas.<br>Las consultas se guardan automáticamente cuando usas la IA.</div>';
        return;
    }
    document.getElementById('historyList').innerHTML=history.map(function(h){
        var date=new Date(h.timestamp);
        var time=date.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'})+' '+date.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
        return '<div class="history-item"><div class="time">'+time+'</div><div style="flex:1;"><div class="q">'+escapeHtml(h.question||'')+'</div>'+(h.answer?'<div class="a">'+escapeHtml(h.answer.substring(0,150))+'...</div>':'')+'</div></div>';
    }).join('');
}

function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function exportHistory(){
    try{var history=JSON.parse(localStorage.getItem('aiHistory')||'[]');}catch(e){var history=[];}
    if(history.length===0){alert('No hay historial');return;}
    var txt='HISTORIAL CONSULTAS IA — Área II Cartagena\n'+new Date().toLocaleString('es-ES')+'\n═══════════════════════════════\n\n';
    history.forEach(function(h){
        var d=new Date(h.timestamp);
        txt+='['+d.toLocaleString('es-ES')+'] ('+h.section+')\n';
        txt+='P: '+h.question+'\nR: '+(h.answer||'—')+'\n\n';
    });
    navigator.clipboard.writeText(txt).then(function(){alert('✅ Historial copiado al portapapeles');});
}

function clearHistory(){
    if(!confirm('¿Borrar todo el historial de consultas IA?'))return;
    localStorage.removeItem('aiHistory');
    showHistory('all',document.querySelector('.tab-row button.active'));
    renderStats();
}

function renderStorage(){
    var total=0;var items=[];
    for(var i=0;i<localStorage.length;i++){
        var key=localStorage.key(i);
        var val=localStorage.getItem(key);
        var size=new Blob([val]).size;
        total+=size;
        items.push({key:key,size:size});
    }
    items.sort(function(a,b){return b.size-a.size;});
    var h='<div style="margin-bottom:8px;"><strong>Total:</strong> '+(total/1024).toFixed(1)+' KB / ~5 MB</div>';
    h+='<div style="background:#0f172a;border-radius:8px;height:8px;overflow:hidden;margin-bottom:10px;"><div style="height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);width:'+(total/5242880*100).toFixed(1)+'%;border-radius:8px;"></div></div>';
    h+=items.slice(0,6).map(function(i){
        return '<div style="display:flex;justify-content:space-between;font-size:.78rem;padding:2px 0;"><span style="color:#94a3b8;">'+i.key+'</span><span style="color:#60a5fa;">'+(i.size/1024).toFixed(1)+' KB</span></div>';
    }).join('');
    document.getElementById('storageInfo').innerHTML=h;
}

// Init
renderStats();
renderWeekChart();
showTop('protocolos',document.querySelector('.tab-row button.active'));
showHistory('all',null);
renderStorage();
</script>
</body>
</html>
